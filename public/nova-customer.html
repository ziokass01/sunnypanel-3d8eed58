<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVA Verify</title>
    <script src="/nova-customer-config.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: #e2e8f0;
        --accent: #f59e0b;
        --accent-2: #0f172a;
        --ok: #15803d;
        --bad: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, rgba(245, 158, 11, 0.12), transparent 30%), var(--bg);
        color: var(--text);
      }
      .wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(100%, 520px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: #fff7ed;
        border: 1px solid #fed7aa;
        color: #9a3412;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.14em;
      }
      h1 {
        margin: 16px 0 8px;
        font-size: 32px;
        line-height: 1.15;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
      .grid {
        display: grid;
        gap: 14px;
        margin-top: 20px;
      }
      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
      }
      input {
        width: 100%;
        height: 52px;
        border-radius: 18px;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: var(--text);
        padding: 0 16px;
        font-size: 15px;
        outline: none;
      }
      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.12);
      }
      .row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      button {
        border: 0;
        border-radius: 18px;
        height: 52px;
        padding: 0 18px;
        font-weight: 700;
        cursor: pointer;
      }
      .primary {
        background: var(--accent);
        color: #111827;
        box-shadow: 0 16px 28px rgba(245, 158, 11, 0.18);
      }
      .secondary {
        background: #e2e8f0;
        color: #0f172a;
      }
      .result {
        margin-top: 20px;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: #f8fafc;
        padding: 16px;
        display: none;
      }
      .result.show { display: block; }
      .status {
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .status.ok { color: var(--ok); }
      .status.bad { color: var(--bad); }
      .kv {
        margin-top: 12px;
        display: grid;
        gap: 10px;
      }
      .item {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        border-bottom: 1px dashed #cbd5e1;
        padding-bottom: 10px;
      }
      .item:last-child { border-bottom: 0; padding-bottom: 0; }
      .muted { color: var(--muted); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; word-break: break-all; }
      .foot {
        margin-top: 16px;
        font-size: 12px;
        color: var(--muted);
      }
      @media (max-width: 520px) {
        .card { padding: 18px; border-radius: 22px; }
        h1 { font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="badge">Customer Verify</div>
        <h1 id="siteTitle">NOVA Verify</h1>
        <p>Nhập key khách hàng để kiểm tra trạng thái. Secret nằm ở Worker, không nằm trong HTML.</p>

        <div class="grid">
          <label>
            Key
            <input id="keyInput" placeholder="XXXX-XXXX-XXXX-XXXX" autocomplete="off" />
          </label>
          <label>
            Device ID
            <input id="deviceInput" placeholder="browser-client" autocomplete="off" />
          </label>
          <div class="row">
            <button class="primary" id="verifyBtn">Kiểm tra key</button>
            <button class="secondary" id="saveBtn" type="button">Lưu device</button>
          </div>
        </div>

        <div class="result" id="resultBox">
          <div class="status" id="statusText">Đang chờ</div>
          <div class="kv" id="resultList"></div>
        </div>

        <div class="foot">
          File này gọi tới <span class="mono" id="apiUrlText">worker chưa cấu hình</span>
        </div>
      </div>
    </div>

    <script>
      const CONFIG = {
        apiUrl: window.NOVA_VERIFY_API_URL || "",
        siteTitle: window.NOVA_SITE_TITLE || "NOVA Verify",
        defaultDeviceId: window.NOVA_DEFAULT_DEVICE_ID || "browser-client",
      };

      const keyInput = document.getElementById("keyInput");
      const deviceInput = document.getElementById("deviceInput");
      const verifyBtn = document.getElementById("verifyBtn");
      const saveBtn = document.getElementById("saveBtn");
      const resultBox = document.getElementById("resultBox");
      const statusText = document.getElementById("statusText");
      const resultList = document.getElementById("resultList");
      const apiUrlText = document.getElementById("apiUrlText");
      const siteTitle = document.getElementById("siteTitle");

      siteTitle.textContent = CONFIG.siteTitle;
      apiUrlText.textContent = CONFIG.apiUrl || "worker chưa cấu hình";

      function normalizeKey(input) {
        return String(input || "")
          .normalize("NFKC")
          .toUpperCase()
          .replace(/[\u2010-\u2015\u2212\uFE58\uFE63\uFF0D]/g, "-")
          .replace(/\s+/g, "")
          .replace(/[^A-Z0-9-]/g, "");
      }

      function fallbackDeviceId() {
        const base = [navigator.platform || "web", navigator.userAgent || "browser"]
          .join("-")
          .replace(/\s+/g, "_")
          .slice(0, 120);
        return `client-${base}`;
      }

      function loadDevice() {
        const saved = localStorage.getItem("nova_customer_device_id");
        deviceInput.value = saved || CONFIG.defaultDeviceId || fallbackDeviceId();
      }

      function saveDevice() {
        const value = String(deviceInput.value || "").trim() || fallbackDeviceId();
        localStorage.setItem("nova_customer_device_id", value);
        deviceInput.value = value;
      }

      function renderResult(data, ok) {
        resultBox.classList.add("show");
        statusText.textContent = ok ? "Hợp lệ" : (data?.code || "Lỗi");
        statusText.className = `status ${ok ? "ok" : "bad"}`;

        const rows = [
          ["ok", data?.ok],
          ["valid", data?.valid],
          ["code", data?.code || "-"],
          ["message", data?.msg || data?.message || "-"],
          ["expires_at", data?.expires_at || "-"],
          ["key_expires_at", data?.key_expires_at || "-"],
          ["max_devices", data?.max_devices ?? "-"],
        ];

        resultList.innerHTML = rows.map(([k, v]) => `
          <div class="item">
            <div class="muted">${k}</div>
            <div class="mono">${String(v)}</div>
          </div>
        `).join("");
      }

      async function verifyKey() {
        const key = normalizeKey(keyInput.value);
        const device_id = String(deviceInput.value || "").trim() || fallbackDeviceId();
        keyInput.value = key;
        deviceInput.value = device_id;

        if (!CONFIG.apiUrl) {
          renderResult({ code: "CONFIG_MISSING", msg: "Thiếu NOVA_VERIFY_API_URL" }, false);
          return;
        }
        if (!key) {
          renderResult({ code: "MISSING_KEY", msg: "Bạn chưa nhập key" }, false);
          return;
        }

        verifyBtn.disabled = true;
        verifyBtn.textContent = "Đang kiểm tra...";
        try {
          const res = await fetch(CONFIG.apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, device_id }),
          });
          const data = await res.json().catch(() => ({}));
          renderResult(data, !!data?.ok && !!data?.valid);
        } catch (error) {
          renderResult({ code: "FETCH_FAILED", msg: String(error?.message || error) }, false);
        } finally {
          verifyBtn.disabled = false;
          verifyBtn.textContent = "Kiểm tra key";
        }
      }

      verifyBtn.addEventListener("click", verifyKey);
      saveBtn.addEventListener("click", saveDevice);
      keyInput.addEventListener("input", () => {
        keyInput.value = normalizeKey(keyInput.value);
      });
      keyInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") verifyKey();
      });
      deviceInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") verifyKey();
      });

      loadDevice();
    </script>
  </body>
</html>
