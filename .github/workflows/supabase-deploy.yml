name: Manual Supabase DB Push (Safe)

on:
  workflow_dispatch:
    inputs:
      confirm_newest_local_migration:
        description: "Type the exact newest local migration filename to unlock db push"
        required: true
        default: ""
      run_functions_after_db:
        description: "Also deploy Edge Functions after DB push"
        required: false
        default: "true"

jobs:
  deploy-db:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration list
        run: supabase migration list

      - name: Confirm newest local migration
        shell: bash
        run: |
          set -euo pipefail
          newest_local=$(ls supabase/migrations/*.sql | xargs -n1 basename | sort | tail -n 1)
          echo "Newest local migration: $newest_local"
          echo "User confirmation input: ${{ github.event.inputs.confirm_newest_local_migration }}"
          if [ "$newest_local" != "${{ github.event.inputs.confirm_newest_local_migration }}" ]; then
            echo "Refusing db push because the confirmation text does not match the newest local migration."
            exit 1
          fi

      - name: Dry run migrations first
        run: supabase db push --include-all --dry-run

      - name: Push migrations
        run: printf 'y\n' | supabase db push --include-all

      - name: Deploy all Edge Functions
        if: ${{ github.event.inputs.run_functions_after_db == 'true' }}
        run: supabase functions deploy --project-ref "$PROJECT_REF"

      - name: Set function secrets
        if: ${{ github.event.inputs.run_functions_after_db == 'true' }}
        run: |
          supabase secrets set \
            ADMIN_EMAILS="${{ secrets.ADMIN_EMAILS }}" \
            PUBLIC_BASE_URL="${{ secrets.PUBLIC_BASE_URL }}" \
            VERIFY_HMAC_SECRET="${{ secrets.VERIFY_HMAC_SECRET }}" \
            TURNSTILE_SITE_KEY="${{ secrets.TURNSTILE_SITE_KEY }}" \
            TURNSTILE_SECRET_KEY="${{ secrets.TURNSTILE_SECRET_KEY }}"
