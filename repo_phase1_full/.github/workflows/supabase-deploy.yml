name: Deploy Supabase (DB + Edge Functions)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_db_push:
        description: "Run supabase db push"
        required: false
        default: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
      - name: Show migration list
        run: supabase migration list
      - name: Repair legacy migration markers 20260327 and 20260327120000
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_db_push == 'true' }}
        run: |
          supabase migration repair --status reverted 20260327 || true
          supabase migration repair --status reverted 20260327120000 || true
      - name: Push migrations
        id: db_push
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_db_push == 'true' }}
        continue-on-error: true
        run: yes | supabase db push --include-all
      - name: Deploy public/admin Edge Functions with verify_jwt disabled
        if: ${{ always() && !cancelled() }}
        run: |
          set -euo pipefail
          no_verify_functions=(
            admin-free-block admin-free-delete-issued admin-free-delete-session admin-free-test
            admin-rent admin-rent-integrations free-admin-test free-close free-config free-gate
            free-resolve free-reveal free-start generate-license-key rent-user rent-verify-key
            reset-key server-app-runtime server-app-runtime-ops verify-key
          )
          for fn in "${no_verify_functions[@]}"; do
            if [ -d "supabase/functions/${fn}" ]; then
              echo "Deploying ${fn} with --no-verify-jwt"
              supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
            fi
          done
      - name: Deploy remaining Edge Functions with default verify_jwt
        if: ${{ always() && !cancelled() }}
        run: |
          set -euo pipefail
          remaining_functions=(mobile-auth-email)
          for fn in "${remaining_functions[@]}"; do
            if [ -d "supabase/functions/${fn}" ]; then
              echo "Deploying ${fn}"
              supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
            fi
          done
      - name: Set function secrets
        if: ${{ always() && !cancelled() }}
        run: |
          supabase secrets set \
            ADMIN_EMAILS="${{ secrets.ADMIN_EMAILS }}" \
            PUBLIC_BASE_URL="${{ secrets.PUBLIC_BASE_URL }}" \
            VERIFY_HMAC_SECRET="${{ secrets.VERIFY_HMAC_SECRET }}" \
            TURNSTILE_SITE_KEY="${{ secrets.TURNSTILE_SITE_KEY }}" \
            TURNSTILE_SECRET_KEY="${{ secrets.TURNSTILE_SECRET_KEY }}" \
            RUNTIME_OPS_ADMIN_KEY="${{ secrets.RUNTIME_OPS_ADMIN_KEY }}"
      - name: Fail workflow if db push failed
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_db_push == 'true' && steps.db_push.outcome == 'failure' }}
        run: |
          echo "supabase db push failed. Functions were still deployed so the site can recover, but the DB migration error still needs to be fixed."
          exit 1
